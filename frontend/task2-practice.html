let _tplOpen = false;
let _tplActiveType = 'type01';
let _tplShowVi = false;
let _tplScores = {};  // { 'type01-0-2': 'ok'|'err' }

function renderTemplateSection() {
  const totalItems = Object.values(TPL_DATA).reduce((s, t) => s + t.sections.reduce((ss, sec) => ss + sec.items.length, 0), 0);
  const doneAll = Object.values(_tplScores).filter(v => v === 'ok').length;
  const badgeLabel = doneAll ? `${doneAll} / ${totalItems} mẫu câu` : `${totalItems} mẫu câu`;
  return `
  <div class="t2-tpl-section-wrap" id="tpl-wrap">
    <button class="t2-tpl-toggle" onclick="toggleTplSection()">
      <span class="t2-tpl-toggle-left">
        <i class="fas fa-book-open"></i>
        📚 Template Task 2 Writing – Luyện Cloze
        <span class="t2-tpl-toggle-badge" id="tpl-main-badge">${badgeLabel}</span>
      </span>
      <i class="fas fa-chevron-down" id="tpl-chevron" style="transition:transform .3s"></i>
    </button>
    <div class="t2-tpl-body ${_tplOpen ? 'open' : ''}" id="tpl-body">
      <div class="t2-type-tabs-outer">
        <div class="t2-type-tabs-wrap" id="tpl-type-tabs">
          ${TPL_TYPES.map(t => `
            <button class="t2-type-tab-btn ${_tplActiveType === t.id ? 'active' : ''}"
              onclick="switchTplType('${t.id}')" data-tpl-type="${t.id}">
              ${t.label}<br><span style="font-size:10px;font-weight:600;opacity:.7">${t.sub}</span>
            </button>`).join('')}
        </div>
        <button class="t2-tpl-vi-btn-tab ${_tplShowVi ? 'active' : ''}" id="tpl-vi-btn" onclick="toggleTplVi()">
          🇻🇳 <span id="tpl-vi-label">${_tplShowVi ? 'Ẩn TV' : 'Tiếng Việt'}</span>
        </button>
      </div>
      <div class="t2-type-progress-wrap"><div class="t2-type-progress-fill" id="tpl-progress-fill" style="width:0%"></div></div>
      <div id="tpl-content-area"></div>
    </div>
  </div>`;
}

function renderTplContent() {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  const area = document.getElementById('tpl-content-area');
  if (!area) return;
  const typeIdx = TPL_TYPES.findIndex(t => t.id === _tplActiveType);
  let done = 0, total = 0;
  type.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      total++;
      const key = `${_tplActiveType}-${si}-${ii}`;
      if (_tplScores[key] === 'ok') done++;
    });
  });

  const sectionsHtml = type.sections.map((sec, si) => {
    const itemsHtml = sec.items.map((item, ii) => {
      const key = `${_tplActiveType}-${si}-${ii}`;
      const scoreState = _tplScores[key] || '';
      const [before, after] = item.en.split('___');
      return `
      <div class="t2-cloze-card ${scoreState === 'ok' ? 'tpl-correct' : scoreState === 'err' ? 'tpl-wrong' : ''}"
           id="cloze-${key}">
        <div class="t2-cloze-en">
          ${escHtml(before)}<input class="t2-cloze-input" id="inp-${key}" type="text"
            placeholder="…" autocomplete="off" spellcheck="false"
            onkeydown="if(event.key==='Enter'){event.preventDefault();checkCloze('${key}','${escAttr(item.answer)}')}"
            oninput="resetClozeCard('${key}')"
          />${escHtml(after || '')}
        </div>
        <div class="t2-cloze-vi ${_tplShowVi ? 'vis' : ''}" id="vi-${key}">${escHtml(item.vi)}</div>
        <div class="t2-cloze-actions">
          <button class="t2-cloze-check" onclick="checkCloze('${key}','${escAttr(item.answer)}')">Kiểm tra</button>
          <button class="t2-cloze-hint" onclick="showClozeHint('${key}','${escAttr(item.answer)}')">Gợi ý</button>
          <span class="t2-cloze-fb" id="fb-${key}"></span>
        </div>
      </div>`;
    }).join('');
    return `<div class="t2-tpl-sub-section">
      <div class="t2-tpl-sub-title"><i class="fas fa-layer-group"></i> ${sec.title}</div>
      ${itemsHtml}
    </div>`;
  }).join('');

  const pct = total ? Math.round(done / total * 100) : 0;
  area.innerHTML = `
    <div class="t2-tpl-content">${sectionsHtml}</div>
    <div class="t2-tpl-all-done-banner ${done === total && total > 0 ? 'vis' : ''}" id="tpl-done-banner">
      🎉 Xuất sắc! Bạn đã hoàn thành <b>${escHtml(TPL_DATA[_tplActiveType].name)}</b>! Nhấn "Làm lại" để ôn tiếp.
    </div>
    <div class="t2-tpl-footer">
      <span>Đã đúng: <span class="t2-tpl-score">${done} / ${total}</span> <span class="t2-tpl-pct">${pct}%</span></span>
      <button class="t2-tpl-reset-btn" onclick="resetTplType()">🔄 Làm lại</button>
    </div>`;
  const fill = document.getElementById('tpl-progress-fill');
  if (fill) fill.style.width = pct + '%';
}

function checkCloze(key, answer) {
  const inp = document.getElementById('inp-' + key);
  const fb  = document.getElementById('fb-'  + key);
  const card = document.getElementById('cloze-' + key);
  if (!inp || !fb || !card) return;
  const userVal = inp.value.trim().toLowerCase();
  const correctVal = answer.toLowerCase();
  if (!userVal) { showToast('Vui lòng nhập từ cần điền!', 'warn', 2000); return; }
  const wasNew = !_tplScores[key];
  const isOk = userVal === correctVal;
  _tplScores[key] = isOk ? 'ok' : 'err';
  card.className = 't2-cloze-card ' + (isOk ? 'tpl-correct' : 'tpl-wrong');
  fb.className   = 't2-cloze-fb ' + (isOk ? 'ok' : 'err');
  fb.textContent = isOk ? '✅ Đúng!' : `❌ Đáp án: "${answer}"`;
  inp.disabled   = isOk;
  if (isOk) {
    playOk();
    if (wasNew) awardTplXP(card);
    setTimeout(() => scrollToNextCloze(key), 450);
  } else {
    playWrong();
  }
  updateTplScore();
  checkTypeComplete();
}

function showClozeHint(key, answer) {
  const inp = document.getElementById('inp-' + key);
  if (!inp || inp.disabled) return;
  const half = answer.slice(0, Math.ceil(answer.length / 2));
  inp.value = half;
  inp.focus();
  showToast('💡 Gợi ý: "' + half + '…"', 'info', 2000);
}

function resetClozeCard(key) {
  // Only reset the visual state; keep _tplScores[key] = 'err' so wasNew stays false on retry
  if (_tplScores[key] === 'err') {
    const card = document.getElementById('cloze-' + key);
    const fb   = document.getElementById('fb-'    + key);
    if (card) card.className = 't2-cloze-card';
    if (fb)   { fb.className = 't2-cloze-fb'; fb.textContent = ''; }
  }
}

function updateTplScore() {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  let done = 0, total = 0;
  type.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      total++;
      const key = `${_tplActiveType}-${si}-${ii}`;
      if (_tplScores[key] === 'ok') done++;
    });
  });
  const scoreEl = document.querySelector('.t2-tpl-score');
  if (scoreEl) scoreEl.textContent = `${done} / ${total}`;
  const pctEl = document.querySelector('.t2-tpl-pct');
  if (pctEl) pctEl.textContent = total ? Math.round(done / total * 100) + '%' : '0%';
  const fill = document.getElementById('tpl-progress-fill');
  if (fill) fill.style.width = total ? (done / total * 100) + '%' : '0%';
  // Update overall badge on toggle button
  const totalAll = Object.values(TPL_DATA).reduce((s, t) => s + t.sections.reduce((ss, sec) => ss + sec.items.length, 0), 0);
  const doneAll = Object.values(_tplScores).filter(v => v === 'ok').length;
  const badge = document.getElementById('tpl-main-badge');
  if (badge) badge.textContent = doneAll ? `${doneAll} / ${totalAll} mẫu câu` : `${totalAll} mẫu câu`;
}

function toggleTplVi() {
  _tplShowVi = !_tplShowVi;
  document.querySelectorAll('.t2-cloze-vi').forEach(el => {
    el.classList.toggle('vis', _tplShowVi);
  });
  const tabBtn = document.getElementById('tpl-vi-btn');
  const label  = document.getElementById('tpl-vi-label');
  if (tabBtn) tabBtn.classList.toggle('active', _tplShowVi);
  if (label)  label.textContent = _tplShowVi ? 'Ẩn TV' : 'Tiếng Việt';
}

function resetTplType() {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  type.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      delete _tplScores[`${_tplActiveType}-${si}-${ii}`];
    });
  });
  renderTplContent();
}

let _pendingTypeId = null;

function switchTplType(typeId) {
  if (typeId === _tplActiveType) return;
  const type = TPL_DATA[_tplActiveType];
  const hasProgress = type && type.sections.some((sec, si) =>
    sec.items.some((item, ii) => !!_tplScores[`${_tplActiveType}-${si}-${ii}`])
  );
  if (hasProgress) {
    _pendingTypeId = typeId;
    const fromMeta = TPL_TYPES.find(t => t.id === _tplActiveType);
    const toMeta   = TPL_TYPES.find(t => t.id === typeId);
    let done = 0, total = 0;
    type.sections.forEach((sec, si) => sec.items.forEach((item, ii) => {
      total++;
      if (_tplScores[`${_tplActiveType}-${si}-${ii}`] === 'ok') done++;
    }));
    document.getElementById('tpl-switch-sub').innerHTML =
      `Bạn đã làm được <b>${done}/${total}</b> câu của <b>${fromMeta ? fromMeta.label : _tplActiveType}</b>.<br>Tiến độ được <b>lưu lại</b> — bạn có thể quay về bất cứ lúc nào.`;
    const confirmBtn = document.getElementById('tpl-switch-confirm-btn');
    if (confirmBtn && toMeta) confirmBtn.textContent = `Chuyển → ${toMeta.label} · ${TPL_DATA[typeId].name}`;
    document.getElementById('tpl-switch-overlay').classList.remove('hidden');
  } else {
    doSwitchType(typeId);
  }
}

function confirmTypeSwitch() {
  document.getElementById('tpl-switch-overlay').classList.add('hidden');
  if (_pendingTypeId) doSwitchType(_pendingTypeId);
  _pendingTypeId = null;
}

function cancelTypeSwitch() {
  document.getElementById('tpl-switch-overlay').classList.add('hidden');
  _pendingTypeId = null;
}

function doSwitchType(typeId) {
  _tplActiveType = typeId;
  document.querySelectorAll('.t2-type-tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tplType === typeId);
  });
  renderTplContent();
}

function toggleTplSection() {
  _tplOpen = !_tplOpen;
  const body = document.getElementById('tpl-body');
  const chevron = document.getElementById('tpl-chevron');
  if (!body) return;
  body.classList.toggle('open', _tplOpen);
  if (chevron) chevron.style.transform = _tplOpen ? 'rotate(180deg)' : 'rotate(0deg)';
  if (_tplOpen) renderTplContent();
}

function bindTemplateSection() {
  if (_tplOpen) renderTplContent();
}

function awardTplXP(card) {
  updateXPStorage(3);
  const rect = card.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 't2-tpl-xp-pop';
  pop.textContent = '+3 XP ⭐';
  pop.style.cssText = `left:${rect.left + window.scrollX + rect.width / 2 - 28}px;top:${rect.top + window.scrollY - 10}px;`;
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

function scrollToNextCloze(currentKey) {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  let found = false;
  for (let si = 0; si < type.sections.length; si++) {
    const sec = type.sections[si];
    for (let ii = 0; ii < sec.items.length; ii++) {
      const k = `${_tplActiveType}-${si}-${ii}`;
      if (k === currentKey) { found = true; continue; }
      if (found && (!_tplScores[k] || _tplScores[k] === 'err')) {
        const nextCard = document.getElementById('cloze-' + k);
        if (nextCard) {
          nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
          const inp = document.getElementById('inp-' + k);
          if (inp && !inp.disabled) setTimeout(() => inp.focus(), 380);
        }
        return;
      }
    }
  }
}

function checkTypeComplete() {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  let done = 0, total = 0;
  type.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      total++;
      if (_tplScores[`${_tplActiveType}-${si}-${ii}`] === 'ok') done++;
    });
  });
  if (done < total) return;
  const banner = document.getElementById('tpl-done-banner');
  if (banner && !banner.classList.contains('vis')) {
    banner.classList.add('vis');
    banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showToast(`🏆 Hoàn thành ${TPL_DATA[_tplActiveType].name}! +10 XP bonus!`, 'success', 3500);
    updateXPStorage(10);
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
