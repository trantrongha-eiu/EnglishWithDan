<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hộp thư – EnglishWithDan</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/dictionary-popup.css">
  <script src="js/theme.js"></script>
  <script src="js/shared/visit-tracker.js"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); }

    /* Layout */
    .inbox-layout { max-width: 960px; margin: 0 auto; padding: 24px 16px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; min-height: calc(100vh - 64px); }
    @media (max-width: 680px) { .inbox-layout { grid-template-columns: 1fr; } .msg-detail { display: none; } .msg-detail.active { display: flex; } }

    /* Message list */
    .msg-list-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
    .panel-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-head h3 { font-size: 15px; font-weight: 700; margin: 0; }
    .badge-count { background: #ef4444; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .msg-list { flex: 1; overflow-y: auto; }
    .msg-item { padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: .15s; display: flex; flex-direction: column; gap: 4px; }
    .msg-item:last-child { border-bottom: none; }
    .msg-item:hover { background: var(--surface2, rgba(0,0,0,.03)); }
    .msg-item.selected { background: var(--brand-light); }
    .msg-item.unread .msg-sender { font-weight: 700; }
    .msg-item.unread .msg-preview { font-weight: 600; color: var(--text); }
    .msg-sender { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .msg-preview { font-size: 12px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msg-subject { font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msg-time { font-size: 11px; color: var(--text3); }
    .dot-unread { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); flex-shrink: 0; }
    .empty-state { padding: 40px 20px; text-align: center; color: var(--text3); }
    .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }

    /* Detail panel */
    .msg-detail { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; display: flex; flex-direction: column; gap: 16px; }
    .detail-placeholder { display: flex; align-items: center; justify-content: center; color: var(--text3); flex-direction: column; gap: 12px; }
    .detail-placeholder i { font-size: 48px; }
    .detail-head { border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    .detail-subject { font-size: 18px; font-weight: 700; color: var(--text); margin: 0 0 8px; }
    .detail-meta { font-size: 13px; color: var(--text3); display: flex; gap: 16px; flex-wrap: wrap; }
    .detail-body { font-size: 15px; line-height: 1.7; color: var(--text); white-space: pre-wrap; flex: 1; }
    .reply-box { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); padding-top: 16px; }
    .reply-box textarea { width: 100%; box-sizing: border-box; resize: vertical; min-height: 70px; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); outline: none; transition: border-color .15s; }
    .reply-box textarea:focus { border-color: var(--brand); }
    .reply-box .btn-primary { align-self: flex-end; background: var(--brand); color: #fff; }
    .reply-box .btn-primary:hover { background: var(--brand-dark); }
    .reply-box .btn-primary:disabled { opacity: .6; cursor: default; }
    .detail-actions { display: flex; gap: 10px; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:10px; border:none; cursor:pointer; font-size:14px; font-weight:600; font-family:inherit; transition:.15s; }
    .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text2); }
    .btn-ghost:hover { background:var(--surface2,rgba(0,0,0,.05)); }
    .btn-danger { background:var(--danger-light); color:var(--danger); border:1px solid rgba(220,38,38,.35); }
    .btn-danger:hover { background:var(--danger); color:#fff; }
    .broadcast-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; background:var(--brand-light); color:var(--brand); border-radius:20px; font-size:12px; font-weight:600; }
  </style>
</head>
<body>
  <script src="js/shared/auth-service.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/shared/utils.js"></script>
  <script src="js/shared/toast.js"></script>
  <script src="js/shared/api-client.js"></script>
  <script src="js/shared/confirm-dialog.js"></script>
  <script src="js/shared/dictionary-lookup.js"></script>

  <div class="inbox-layout">
    <!-- Message list -->
    <div class="msg-list-panel">
      <div class="panel-head">
        <h3><i class="fas fa-inbox"></i> Hộp thư đến</h3>
        <span id="unreadBadge" class="badge-count" style="display:none"></span>
      </div>
      <div class="msg-list" id="msgList">
        <div class="empty-state"><i class="fas fa-envelope-open"></i><p>Đang tải...</p></div>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="msg-detail" id="msgDetail">
      <div class="detail-placeholder">
        <i class="fas fa-envelope-open-text"></i>
        <p>Chọn một tin nhắn để đọc</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       DICTIONARY LOOKUP (double-click a word)
  ═══════════════════════════════════════════ -->
  <div id="dict-popup" class="dict-popup hidden">
    <div class="dict-header">
      <span class="dict-word" id="dict-word"></span>
      <span class="dict-phonetic" id="dict-phonetic"></span>
      <button class="dict-speak" onclick="speakDictWord()" title="Nghe phát âm"><i class="fas fa-volume-up"></i></button>
      <button class="dict-close" onclick="closeDictPopup()"><i class="fas fa-times"></i></button>
    </div>
    <div id="dict-body" class="dict-body"></div>
  </div>

  <div id="dict-vocab-modal" class="dict-vocab-modal hidden">
    <div class="dict-vocab-box">
      <div class="dict-vocab-header">
        <h3>📚 Lưu vào sổ từ vựng</h3>
        <button class="dict-vocab-close" onclick="closeVocabPickerModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="dict-vocab-body">
        <div id="dict-vocab-book-list"></div>
        <div class="rd-vocab-new-section">
          <div class="rd-vocab-new-label">Hoặc tạo sổ mới:</div>
          <div style="display:flex;gap:8px">
            <input id="dict-new-book-name" type="text" placeholder="Tên sổ mới..." maxlength="40"
              class="rd-vocab-input"
              onkeydown="if(event.key==='Enter') createDictBookAndSave()" />
            <button onclick="createDictBookAndSave()" class="rd-vocab-create-btn">+ Tạo &amp; lưu</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/inbox.js"></script>
</body>
</html>
