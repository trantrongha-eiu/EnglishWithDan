<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang xử lý đăng nhập... - EnglishWithDan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth-callback.css">
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h2>Đang đăng nhập...</h2>
    <p>Vui lòng chờ trong giây lát</p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');
      const userRaw = params.get('user');
      const error  = params.get('error');

      if (error || !token) {
        const card = document.getElementById('card');
        card.classList.add('error-state');
        card.innerHTML = `
          <div class="spinner"></div>
          <h2>Đăng nhập thất bại</h2>
          <p>${error === 'not_configured' ? 'Google OAuth chưa được cấu hình.' : 'Đã xảy ra lỗi. Vui lòng thử lại.'}</p>
          <a href="login.html" class="btn">Quay lại đăng nhập</a>
        `;
        return;
      }

      try {
        const user = JSON.parse(decodeURIComponent(userRaw));
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(user));
        localStorage.setItem('lastLoginAt', Date.now().toString());

        const role = user.role;
        if (role === 'admin' || role === 'teacher') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        document.getElementById('card').innerHTML = `
          <h2 style="color:#ef4444">Lỗi xử lý phản hồi</h2>
          <p>Vui lòng thử lại</p>
          <a href="login.html" class="btn">Quay lại đăng nhập</a>
        `;
      }
    })();
  </script>
</body>
</html>
