<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang xử lý đăng nhập... - EnglishWithDan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth-callback.css">
  <script src="js/shared/safe-redirect.js"></script>
  <script src="js/shared/auth-service.js"></script>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h2>Đang đăng nhập...</h2>
    <p>Vui lòng chờ trong giây lát</p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');
      const userRaw = params.get('user');
      const error  = params.get('error');

      if (error || !token) {
        const card = document.getElementById('card');
        card.classList.add('error-state');
        card.innerHTML = `
          <div class="spinner"></div>
          <h2>Đăng nhập thất bại</h2>
          <p>${error === 'not_configured' ? 'Google OAuth chưa được cấu hình.' : 'Đã xảy ra lỗi. Vui lòng thử lại.'}</p>
          <a href="login.html" class="btn">Quay lại đăng nhập</a>
        `;
        return;
      }

      try {
        const user = JSON.parse(decodeURIComponent(userRaw));
        // Session creation centralized in AuthService.login() (Phase 5) —
        // same call login.html's JWT flow uses, so there's exactly one
        // place that decides what a "session" is made of.
        window.AuthService.login(token, user);

        // Redirect-back support: backend/controllers/auth.controller.js's
        // googleCallback forwards the OAuth `state` it received as `next`
        // here — either a student page or an admin hash-route
        // (/admin/#/...). getPostLoginRedirect() centralizes the same
        // role-matched next= logic login.html's JWT flow uses (Phase 5).
        // Must be computed BEFORE the history scrub below, since it reads
        // next= from the current location.search.
        const dest = window.AuthService.getPostLoginRedirect(user);

        // Security (routing audit finding): the JWT and full user payload
        // arrive in this page's URL (backend/controllers/auth.controller.js
        // has no other way to hand them to a static page after the OAuth
        // round trip). Once they're safely in localStorage, scrub them from
        // this history entry immediately — otherwise the token sits in
        // cleartext in browser history/sync forever, retrievable via Back.
        // We're about to navigate away anyway, so this only affects what
        // the *previous* entry looks like if the user later hits Back.
        history.replaceState(null, '', 'auth-callback.html');

        window.location.href = dest;
      } catch (err) {
        document.getElementById('card').innerHTML = `
          <h2 style="color:#ef4444">Lỗi xử lý phản hồi</h2>
          <p>Vui lòng thử lại</p>
          <a href="login.html" class="btn">Quay lại đăng nhập</a>
        `;
      }
    })();
  </script>
</body>
</html>
