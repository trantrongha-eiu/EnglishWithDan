<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang xử lý đăng nhập... - EnglishWithDan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: white; border-radius: 24px;
      padding: 48px 40px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      max-width: 380px; width: 90%;
    }
    .spinner {
      width: 56px; height: 56px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 20px; color: #1f2937; margin-bottom: 8px; }
    p  { color: #6b7280; font-size: 14px; }
    .error-state .spinner { border-top-color: #ef4444; }
    .error-state h2 { color: #ef4444; }
    .btn {
      margin-top: 20px;
      display: inline-block; padding: 12px 28px;
      background: linear-gradient(135deg,#667eea,#764ba2);
      color: white; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h2>Đang đăng nhập...</h2>
    <p>Vui lòng chờ trong giây lát</p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');
      const userRaw = params.get('user');
      const error  = params.get('error');

      if (error || !token) {
        const card = document.getElementById('card');
        card.classList.add('error-state');
        card.innerHTML = `
          <div class="spinner"></div>
          <h2>Đăng nhập thất bại</h2>
          <p>${error === 'not_configured' ? 'Google OAuth chưa được cấu hình.' : 'Đã xảy ra lỗi. Vui lòng thử lại.'}</p>
          <a href="login.html" class="btn">Quay lại đăng nhập</a>
        `;
        return;
      }

      try {
        const user = JSON.parse(decodeURIComponent(userRaw));
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(user));
        localStorage.setItem('lastLoginAt', Date.now().toString());

        const role = user.role;
        if (role === 'admin' || role === 'teacher') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        document.getElementById('card').innerHTML = `
          <h2 style="color:#ef4444">Lỗi xử lý phản hồi</h2>
          <p>Vui lòng thử lại</p>
          <a href="login.html" class="btn">Quay lại đăng nhập</a>
        `;
      }
    })();
  </script>
</body>
</html>
