<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 2 Templates – EnglishWithDan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="writing-practice.css"/>
  <link rel="stylesheet" href="css/mobile.css"/>
  <script src="js/theme.js"></script>
  <style>
    #wp-toast{position:fixed;top:calc(var(--nav-height,64px) + 8px);left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:10px;font-size:14px;font-weight:500;color:#fff;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s,top .25s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18)}
    #wp-toast.show{opacity:1;top:calc(var(--nav-height,64px) + 14px)}
    #wp-toast.warn{background:#e65100}
    #wp-toast.error{background:#c62828}
    #wp-toast.info{background:#1565c0}
    #wp-toast.success{background:#15803d}

    .t2-quit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(2px)}
    .t2-quit-overlay.hidden{display:none}
    .t2-quit-box{background:#fff;border-radius:18px;width:320px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.28);animation:t2QuitIn .2s ease}
    @keyframes t2QuitIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
    .t2-quit-top{background:linear-gradient(135deg,#ede9fe,#ddd6fe);padding:28px 24px 18px;text-align:center}
    .t2-quit-mascot{font-size:44px;line-height:1}
    .t2-quit-title{font-size:17px;font-weight:800;color:#4c1d95;margin:10px 0 5px}
    .t2-quit-sub{font-size:13px;color:#6b7280;line-height:1.5}
    .t2-quit-actions{padding:18px 24px;display:flex;flex-direction:column;gap:10px}
    .t2-quit-continue{background:#6366f1;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
    .t2-quit-continue:hover{background:#4f46e5}
    .t2-quit-leave{background:none;color:#6b7280;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer}
    .t2-quit-leave:hover{border-color:#e53935;color:#e53935}
    [data-theme="dark"] .t2-quit-box{background:#1e293b}
    [data-theme="dark"] .t2-quit-top{background:linear-gradient(135deg,#1e1b4b,#2e1065)}
    [data-theme="dark"] .t2-quit-title{color:#c4b5fd}
    [data-theme="dark"] .t2-quit-leave{border-color:#374151;color:#9ca3af}

    .tpl-page-hero{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:20px 24px 0;color:#fff}
    .tpl-page-hero-inner{max-width:900px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .tpl-page-title{font-size:20px;font-weight:900;margin:0 0 3px}
    .tpl-page-sub{font-size:13px;opacity:.85;margin:0}
    .tpl-overall-badge{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}

    .tpl-tabs-wrap{max-width:900px;margin:0 auto;background:#fff}
    [data-theme="dark"] .tpl-tabs-wrap{background:#1e293b}

    .t2-type-tabs-outer{display:flex;align-items:stretch;border-bottom:2px solid #e5e7eb;background:#fafafa}
    [data-theme="dark"] .t2-type-tabs-outer{border-color:#334155;background:#0f172a}
    .t2-type-tabs-wrap{display:flex;overflow-x:auto;flex:1;gap:0;border-bottom:none;padding:0 0 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:transparent}
    .t2-type-tabs-wrap::-webkit-scrollbar{display:none}
    .t2-tpl-vi-btn-tab{flex-shrink:0;border:none;border-left:1px solid #e5e7eb;background:none;padding:6px 14px;font-size:11px;font-weight:700;color:#6b7280;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;transition:background .15s,color .15s}
    .t2-tpl-vi-btn-tab:hover{background:#f0f0ff;color:#6366f1}
    .t2-tpl-vi-btn-tab.active{background:#ede9fe;color:#4338ca}
    [data-theme="dark"] .t2-tpl-vi-btn-tab{border-color:#1e293b;color:#64748b}
    [data-theme="dark"] .t2-tpl-vi-btn-tab:hover,[data-theme="dark"] .t2-tpl-vi-btn-tab.active{background:#1e1b4b;color:#a5b4fc}
    .t2-type-tab-btn{padding:11px 14px;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;font-size:12px;font-weight:700;color:#6b7280;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;flex-shrink:0}
    .t2-type-tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}
    .t2-type-tab-btn:hover{color:#6366f1}
    [data-theme="dark"] .t2-type-tab-btn{color:#64748b}
    [data-theme="dark"] .t2-type-tab-btn.active{color:#a5b4fc;border-bottom-color:#a5b4fc}

    /* Exam button in tab bar */
    .t2-tpl-exam-btn-tab{flex-shrink:0;border:none;border-left:1px solid #e5e7eb;background:none;padding:6px 14px;font-size:11px;font-weight:700;color:#6b7280;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;transition:background .15s,color .15s}
    .t2-tpl-exam-btn-tab:hover{background:#fff7ed;color:#ea580c}
    .t2-tpl-exam-btn-tab.active{background:#fff7ed;color:#ea580c}
    [data-theme="dark"] .t2-tpl-exam-btn-tab{border-color:#1e293b;color:#64748b}
    [data-theme="dark"] .t2-tpl-exam-btn-tab:hover,[data-theme="dark"] .t2-tpl-exam-btn-tab.active{background:#431407;color:#fb923c}

    .t2-type-progress-wrap{height:4px;background:#e5e7eb;overflow:hidden}
    [data-theme="dark"] .t2-type-progress-wrap{background:#334155}
    .t2-type-progress-fill{height:4px;background:linear-gradient(90deg,#667eea,#764ba2);width:0%;transition:width .5s cubic-bezier(.4,0,.2,1)}

    .tpl-content-outer{max-width:900px;margin:0 auto;background:#fff;border-left:1px solid #e5e7eb;border-right:1px solid #e5e7eb}
    [data-theme="dark"] .tpl-content-outer{background:#1e293b;border-color:#334155}

    /* Exam bar */
    .t2-exam-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:#fff7ed;border-bottom:2px solid #fed7aa;font-size:12px;font-weight:700;color:#c2410c;gap:8px;position:sticky;top:var(--nav-height,64px);z-index:50;flex-wrap:wrap}
    [data-theme="dark"] .t2-exam-bar{background:#431407;border-color:#7c2d12;color:#fb923c}
    .t2-exam-timer{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.5px;min-width:52px}
    .t2-exam-timer.warn{color:#dc2626 !important}
    .t2-exam-label{font-size:11px;color:#9a3412;font-weight:600;flex:1;text-align:center}
    [data-theme="dark"] .t2-exam-label{color:#fdba74}
    .t2-exam-exit-btn{border:1.5px solid #fb923c;background:none;color:#ea580c;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
    .t2-exam-exit-btn:hover{background:#fff7ed}
    .t2-exam-submit-btn{background:#ea580c;color:#fff;border:none;border-radius:8px;padding:7px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:6px}
    .t2-exam-submit-btn:hover{background:#c2410c}

    /* Cloze cards */
    .t2-tpl-sub-section{padding:14px 16px 6px;border-bottom:1px solid #f3f4f6;border-left:3px solid transparent}
    [data-theme="dark"] .t2-tpl-sub-section{border-bottom-color:#1e293b}
    .t2-tpl-sub-section[data-sec="0"]{border-left-color:#3b82f6}
    .t2-tpl-sub-section[data-sec="1"]{border-left-color:#10b981}
    .t2-tpl-sub-section[data-sec="2"]{border-left-color:#f59e0b}
    .t2-tpl-sub-section[data-sec="3"]{border-left-color:#8b5cf6}
    .t2-tpl-sub-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .t2-cloze-card{background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:10px;transition:border-color .2s,background .2s}
    [data-theme="dark"] .t2-cloze-card{background:#0f172a;border-color:#1e293b}
    .t2-cloze-card.tpl-correct{border-color:#16a34a;background:#f0fdf4}
    .t2-cloze-card.tpl-wrong{border-color:#dc2626;background:#fff1f2}
    [data-theme="dark"] .t2-cloze-card.tpl-correct{background:#052e16;border-color:#16a34a}
    [data-theme="dark"] .t2-cloze-card.tpl-wrong{background:#1c0505;border-color:#dc2626}
    .t2-multi-badge{display:inline-flex;align-items:center;gap:3px;background:#fef3c7;border:1px solid #fcd34d;border-radius:5px;padding:1px 6px;font-size:10px;font-weight:700;color:#92400e;margin-bottom:5px}
    [data-theme="dark"] .t2-multi-badge{background:#451a03;border-color:#92400e;color:#fcd34d}
    .t2-cloze-en{font-size:13px;color:#111827;line-height:1.9;margin-bottom:5px}
    [data-theme="dark"] .t2-cloze-en{color:#e2e8f0}
    .t2-cloze-input{border:1.5px solid #6366f1;border-radius:6px;padding:3px 8px;font-size:13px;width:130px;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s;background:#fff;color:#111827;vertical-align:middle;margin:0 2px}
    .t2-cloze-input:focus{box-shadow:0 0 0 3px #e0e7ff}
    [data-theme="dark"] .t2-cloze-input{background:#1e293b;border-color:#818cf8;color:#f1f5f9}
    .t2-blank-num{font-size:10px;font-weight:700;color:#6366f1;vertical-align:middle;margin-right:1px}
    .t2-cloze-vi{font-size:11.5px;color:#6b7280;margin-top:5px;font-style:italic;display:none;line-height:1.5}
    .t2-cloze-vi.vis{display:block}
    .t2-cloze-actions{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
    .t2-cloze-check{border:none;background:#6366f1;color:#fff;border-radius:7px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
    .t2-cloze-check:hover{background:#4f46e5}
    .t2-cloze-hint{border:1.5px solid #d1d5db;background:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;transition:all .15s}
    .t2-cloze-hint:hover{border-color:#6366f1;color:#6366f1}
    [data-theme="dark"] .t2-cloze-hint{border-color:#334155;color:#94a3b8}
    .t2-cloze-fb{font-size:12px;font-weight:700;display:none;padding:3px 8px;border-radius:6px}
    .t2-cloze-fb.ok{display:inline;color:#16a34a;background:#dcfce7}
    .t2-cloze-fb.err{display:inline;color:#dc2626;background:#fee2e2}

    .t2-tpl-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f9fafb;border-top:1px solid #e5e7eb;font-size:12px;color:#6b7280;flex-wrap:wrap;gap:8px}
    [data-theme="dark"] .t2-tpl-footer{background:#0f172a;border-color:#334155}
    .t2-tpl-score{font-weight:800;color:#6366f1;background:#ede9fe;border-radius:20px;padding:2px 10px}
    .t2-tpl-pct{font-size:11px;color:#9ca3af;margin-left:4px;font-weight:600}
    .t2-tpl-reset-btn{border:1.5px solid #d1d5db;background:none;border-radius:7px;padding:4px 12px;font-size:11px;font-weight:700;color:#6b7280;cursor:pointer}
    .t2-tpl-reset-btn:hover{border-color:#6366f1;color:#6366f1}
    [data-theme="dark"] .t2-tpl-reset-btn{border-color:#334155;color:#94a3b8}

    .t2-tpl-all-done-banner{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:2px solid #34d399;border-radius:10px;padding:12px 16px;margin:12px 16px 4px;text-align:center;font-weight:700;color:#065f46;font-size:13px;display:none;line-height:1.5}
    .t2-tpl-all-done-banner.vis{display:block;animation:t2QuitIn .3s ease}
    [data-theme="dark"] .t2-tpl-all-done-banner{background:linear-gradient(135deg,#052e16,#064e3b);color:#6ee7b7;border-color:#065f46}

    .t2-tpl-xp-pop{position:absolute;font-size:16px;font-weight:900;color:#f59e0b;text-shadow:0 1px 6px rgba(0,0,0,.18);pointer-events:none;z-index:9999;animation:tplXpPop .85s ease forwards;white-space:nowrap}
    @keyframes tplXpPop{0%{opacity:1;transform:translateY(0) scale(.9)}60%{opacity:1;transform:translateY(-44px) scale(1.15)}100%{opacity:0;transform:translateY(-72px) scale(1)}}

    /* Type info card */
    .t2-type-info-card{margin:14px 16px 2px;border-radius:12px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border:1.5px solid #c4b5fd;background:linear-gradient(135deg,#ede9fe,#e0e7ff)}
    [data-theme="dark"] .t2-type-info-card{background:linear-gradient(135deg,#1e1b4b,#1e293b);border-color:#3730a3}
    .t2-type-info-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
    .t2-type-info-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0}
    .t2-type-info-name{font-size:14px;font-weight:800;color:#3730a3;line-height:1.2}
    [data-theme="dark"] .t2-type-info-name{color:#a5b4fc}
    .t2-type-info-desc{font-size:11.5px;color:#6b7280;margin-top:3px;line-height:1.4}
    [data-theme="dark"] .t2-type-info-desc{color:#94a3b8}
    .t2-type-structure{font-size:11px;font-weight:600;color:#6366f1;background:rgba(99,102,241,.1);border-radius:8px;padding:5px 10px;white-space:nowrap}
    [data-theme="dark"] .t2-type-structure{color:#a5b4fc;background:rgba(99,102,241,.15)}

    @media(max-width:600px){
      .tpl-page-hero{padding:14px 14px 0}
      .tpl-page-title{font-size:16px}
      .t2-cloze-input{width:88px;font-size:12px;padding:3px 6px}
      .t2-cloze-en{font-size:12px;line-height:1.75;word-break:break-word}
      .t2-cloze-card{padding:10px 11px;margin-bottom:8px}
      .t2-cloze-actions{gap:6px;margin-top:7px}
      .t2-cloze-check{padding:5px 10px;font-size:11px}
      .t2-cloze-hint{padding:4px 8px;font-size:10px}
      .t2-tpl-footer{flex-direction:column;align-items:flex-start;gap:10px;padding:10px 12px}
      .t2-tpl-sub-section{padding:11px 11px 4px}
      .t2-tpl-sub-title{font-size:10px}
      .t2-type-tab-btn{padding:9px 10px;font-size:11px}
      .t2-tpl-all-done-banner{margin:10px 11px 2px;font-size:12px}
      .t2-type-info-card{margin:10px 11px 0;padding:10px 12px}
      .t2-type-structure{display:none}
      .t2-exam-bar{padding:8px 12px}
      .t2-exam-timer{font-size:16px}
    }
  </style>
</head>
<body>
<script src="js/nav.js"></script>

<div id="wp-toast"></div>

<!-- Type switch confirm modal -->
<div class="t2-quit-overlay hidden" id="tpl-switch-overlay">
  <div class="t2-quit-box">
    <div class="t2-quit-top">
      <div class="t2-quit-mascot">🔀</div>
      <div class="t2-quit-title">Chuyển template?</div>
      <div class="t2-quit-sub" id="tpl-switch-sub"></div>
    </div>
    <div class="t2-quit-actions">
      <button class="t2-quit-continue" onclick="cancelTypeSwitch()">
        <i class="fas fa-arrow-left"></i> Ở lại làm tiếp
      </button>
      <button class="t2-quit-leave" id="tpl-switch-confirm-btn" onclick="confirmTypeSwitch()">
        Chuyển sang type mới
      </button>
    </div>
  </div>
</div>

<!-- Stats header -->
<header class="wp-header">
  <button onclick="history.back()" style="display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border:1.5px solid #e5e7eb;border-radius:8px;background:none;font-size:13px;font-weight:600;color:#374151;cursor:pointer;transition:all .15s;font-family:inherit;flex-shrink:0" onmouseover="this.style.borderColor='#6366f1';this.style.color='#6366f1'" onmouseout="this.style.borderColor='#e5e7eb';this.style.color='#374151'">← Quay lại</button>
  <div class="wp-header-right">
    <div class="wp-xp-badge"><i class="fas fa-star"></i> <span id="header-xp">0</span> XP</div>
    <div class="wp-streak-badge">🔥 <span id="header-streak">0</span></div>
    <span class="wp-username" id="userName">👋 Xin chào</span>
    <button onclick="toggleWpSound()" class="wp-logout-btn" id="wp-sound-toggle" title="Bật/tắt âm thanh">🔊</button>
  </div>
</header>

<!-- Page hero -->
<div class="tpl-page-hero">
  <div class="tpl-page-hero-inner">
    <div>
      <h1 class="tpl-page-title">📚 Template Task 2 Writing – Luyện Cloze</h1>
      <p class="tpl-page-sub">Điền từ 132 mẫu câu theo 7 dạng bài IELTS Task 2</p>
    </div>
    <span class="tpl-overall-badge" id="tpl-main-badge">0 / 132 mẫu câu</span>
  </div>
  <div class="tpl-tabs-wrap">
    <div class="t2-type-tabs-outer">
      <div class="t2-type-tabs-wrap" id="tpl-type-tabs"></div>
      <button class="t2-tpl-exam-btn-tab" id="tpl-exam-btn" onclick="toggleExamMode()" title="Chế độ thi thử – không có gợi ý, nộp bài để xem điểm">
        ⏱ <span id="tpl-exam-label">Thi thử</span>
      </button>
      <button class="t2-tpl-vi-btn-tab" id="tpl-vi-btn" onclick="toggleTplVi()">
        🇻🇳 <span id="tpl-vi-label">Tiếng Việt</span>
      </button>
    </div>
    <div class="t2-type-progress-wrap">
      <div class="t2-type-progress-fill" id="tpl-progress-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- Content -->
<div class="tpl-content-outer">
  <div id="tpl-content-area"></div>
</div>

<script src="js/auth.js"></script>
<script>
const API = 'https://englishwithdan.onrender.com';

const _sndCorrect = new Audio('./sounds/correct.mp3');
const _sndWrong   = new Audio('./sounds/incorrect.mp3');
_sndCorrect.volume = 0.5; _sndWrong.volume = 0.5;
let _soundEnabled = localStorage.getItem('wp_sound') !== 'off';
function playOk()    { if (!_soundEnabled) return; _sndCorrect.currentTime = 0; _sndCorrect.play().catch(()=>{}); }
function playWrong() { if (!_soundEnabled) return; _sndWrong.currentTime   = 0; _sndWrong.play().catch(()=>{}); }
function toggleWpSound() {
  _soundEnabled = !_soundEnabled;
  localStorage.setItem('wp_sound', _soundEnabled ? 'on' : 'off');
  document.getElementById('wp-sound-toggle').textContent = _soundEnabled ? '🔊' : '🔇';
}

function showToast(msg, type = 'warn', ms = 3000) {
  const el = document.getElementById('wp-toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t); el._t = setTimeout(() => { el.className = ''; }, ms);
}

function loadXPFromStorage() {
  const stored = JSON.parse(localStorage.getItem('t2_progress') || '{"xp":0,"streak":0}');
  document.getElementById('header-xp').textContent     = stored.xp     || 0;
  document.getElementById('header-streak').textContent = stored.streak  || 0;
}
function updateXPStorage(earned) {
  const stored = JSON.parse(localStorage.getItem('t2_progress') || '{"xp":0,"streak":0}');
  stored.xp = (stored.xp || 0) + earned;
  localStorage.setItem('t2_progress', JSON.stringify(stored));
  document.getElementById('header-xp').textContent     = stored.xp;
  document.getElementById('header-streak').textContent = stored.streak || 0;
}
function initUser() {
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const name = user.firstName ? `${user.firstName} ${user.lastName||''}`.trim() : user.username || '';
  if (name) document.getElementById('userName').textContent = '👋 ' + name;
  document.getElementById('wp-sound-toggle').textContent = _soundEnabled ? '🔊' : '🔇';
  loadXPFromStorage();
}

// ── Template data ──────────────────────────────────────────────
let TPL_TYPES = [

// ── State ──────────────────────────────────────────────────────
let _tplActiveType = 'type01';
let _tplShowVi     = false;
let _tplScores     = {};
let _pendingTypeId   = null;
let _pendingExamSwitch = false;

// Exam mode state
let _examMode          = false;
let _examTimerInterval = null;
let _examTimeLeft      = 1800;
let _examStartTime     = null;

function saveTplScores() {
  localStorage.setItem('tpl_scores', JSON.stringify(_tplScores));
}

// ── Init ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  initUser();
  try {
    const saved = localStorage.getItem('tpl_scores');
    if (saved) _tplScores = JSON.parse(saved);
  } catch(e) {}

  try {
    const res = await fetch(`${API}/task2/templates`);
    if (res.ok) {
      const data = await res.json();
      if (data.success && data.templates && data.templates.length > 0) {
        // Preserve local metadata (icon, color, desc, structure) not stored in DB
        const localMeta = [...TPL_TYPES];
        TPL_TYPES = data.templates.map(t => {
          const lm = localMeta.find(lt => lt.id === t.typeId) || {};
          return { id: t.typeId, label: t.label, sub: t.sub,
            icon: lm.icon, color: lm.color, desc: lm.desc, structure: lm.structure };
        });
        TPL_DATA = {};
        data.templates.forEach(t => { TPL_DATA[t.typeId] = { name: t.name, sections: t.sections }; });
        if (!TPL_DATA[_tplActiveType]) _tplActiveType = TPL_TYPES[0]?.id || 'type01';
      }
    }
  } catch(e) {}

  renderTabs();
  renderTplContent();
  updateOverallBadge();
  document.getElementById('tpl-switch-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) cancelTypeSwitch();
  });
});

// ── Render tabs ────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById('tpl-type-tabs');
  if (!wrap) return;
  wrap.innerHTML = TPL_TYPES.map(t => `
    <button class="t2-type-tab-btn ${_tplActiveType === t.id ? 'active' : ''}"
      onclick="switchTplType('${t.id}')" data-tpl-type="${t.id}">
      ${t.icon ? `<i class="fas ${t.icon}" style="font-size:9px;opacity:.65;margin-right:2px"></i>` : ''}${t.label}<br>
      <span style="font-size:10px;font-weight:600;opacity:.7">${t.sub}</span>
    </button>`).join('');
}

// ── Render content ─────────────────────────────────────────────
function renderTplContent() {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  const area = document.getElementById('tpl-content-area');
  if (!area) return;

  let done = 0, total = 0;
  if (!_examMode) {
    type.sections.forEach((sec, si) => {
      sec.items.forEach((item, ii) => {
        total++;
        if (_tplScores[`${_tplActiveType}-${si}-${ii}`] === 'ok') done++;
      });
    });
  }

  const typeMeta = TPL_TYPES.find(t => t.id === _tplActiveType);
  const infoCard = typeMeta && typeMeta.icon ? `
    <div class="t2-type-info-card">
      <div class="t2-type-info-left">
        <div class="t2-type-info-icon" style="background:${typeMeta.color||'#6366f1'}"><i class="fas ${typeMeta.icon}"></i></div>
        <div>
          <div class="t2-type-info-name">${escHtml(type.name)}</div>
          ${typeMeta.desc ? `<div class="t2-type-info-desc">${escHtml(typeMeta.desc)}</div>` : ''}
        </div>
      </div>
      ${typeMeta.structure ? `<div class="t2-type-structure"><i class="fas fa-route" style="margin-right:4px;font-size:10px;opacity:.7"></i>${escHtml(typeMeta.structure)}</div>` : ''}
    </div>` : '';

  const sectionsHtml = type.sections.map((sec, si) => {
    const itemsHtml = sec.items.map((item, ii) => {
      const key = `${_tplActiveType}-${si}-${ii}`;
      const scoreState = _examMode ? '' : (_tplScores[key] || '');
      const answers = Array.isArray(item.answers) ? item.answers : [item.answer];
      const answersStr = escAttr(answers.join('||'));
      const isMulti = answers.length > 1;
      const parts = item.en.split('___');

      // Build English text with input(s)
      let enHtml = '';
      parts.forEach((part, pi) => {
        enHtml += escHtml(part);
        if (pi < answers.length) {
          const inpId = isMulti ? `inp-${key}-b${pi}` : `inp-${key}`;
          const isLocked = !_examMode && scoreState === 'ok';
          enHtml += `<input class="t2-cloze-input" id="${inpId}" type="text"
            placeholder="…" autocomplete="off" spellcheck="false"
            ${isLocked ? 'disabled' : ''}
            onkeydown="if(!_examMode && event.key==='Enter'){event.preventDefault();checkCloze('${key}','${answersStr}')}"
            oninput="resetClozeCard('${key}')"
            value="${isLocked ? escAttr(answers[pi]) : ''}"
          />`;
        }
      });

      const errDisplay = answers.map(a => `"${escHtml(a)}"`).join(', ');
      const multiBadge = isMulti ? `<div class="t2-multi-badge"><i class="fas fa-pen-to-square" style="font-size:9px"></i> ${answers.length} từ cần điền</div>` : '';

      if (_examMode) {
        return `
        <div class="t2-cloze-card" id="cloze-${key}">
          ${multiBadge}
          <div class="t2-cloze-en">${enHtml}</div>
          <div class="t2-cloze-actions">
            <span class="t2-cloze-fb" id="fb-${key}"></span>
          </div>
        </div>`;
      }

      return `
      <div class="t2-cloze-card ${scoreState === 'ok' ? 'tpl-correct' : scoreState === 'err' ? 'tpl-wrong' : ''}"
           id="cloze-${key}">
        ${multiBadge}
        <div class="t2-cloze-en">${enHtml}</div>
        <div class="t2-cloze-vi ${_tplShowVi ? 'vis' : ''}" id="vi-${key}">${escHtml(item.vi)}</div>
        <div class="t2-cloze-actions">
          ${scoreState !== 'ok' ? `
          <button class="t2-cloze-check" onclick="checkCloze('${key}','${answersStr}')">Kiểm tra</button>
          <button class="t2-cloze-hint" onclick="showClozeHint('${key}','${answersStr}')">Gợi ý</button>
          ` : ''}
          <span class="t2-cloze-fb ${scoreState === 'ok' ? 'ok' : scoreState === 'err' ? 'err' : ''}"
                id="fb-${key}">${scoreState === 'ok' ? '✅ Đúng!' : scoreState === 'err' ? `❌ Đáp án: ${errDisplay}` : ''}</span>
        </div>
      </div>`;
    }).join('');

    return `<div class="t2-tpl-sub-section" data-sec="${si}">
      <div class="t2-tpl-sub-title"><i class="fas fa-layer-group"></i> ${sec.title}</div>
      ${itemsHtml}
    </div>`;
  }).join('');

  const pct = total ? Math.round(done / total * 100) : 0;

  const examBar = _examMode ? `
    <div class="t2-exam-bar" id="exam-bar">
      <span class="t2-exam-timer" id="exam-time-display">${fmtTime(_examTimeLeft)}</span>
      <span class="t2-exam-label"><i class="fas fa-clock" style="margin-right:4px;opacity:.7"></i>${escHtml(type.name)} · Chế độ thi thử</span>
      <button class="t2-exam-exit-btn" onclick="exitExamMode()">✕ Thoát</button>
    </div>` : '';

  const footerHtml = _examMode
    ? `<div class="t2-tpl-footer">
        <span style="font-size:12px;color:#6b7280">Điền tất cả rồi nhấn nộp bài</span>
        <button class="t2-exam-submit-btn" onclick="submitExam()"><i class="fas fa-paper-plane"></i> Nộp bài</button>
       </div>`
    : `<div class="t2-tpl-footer">
        <span>Đã đúng: <span class="t2-tpl-score">${done} / ${total}</span> <span class="t2-tpl-pct">${pct}%</span></span>
        <button class="t2-tpl-reset-btn" onclick="resetTplType()">🔄 Làm lại</button>
       </div>`;

  area.innerHTML = `
    ${examBar}
    <div class="t2-tpl-content">${infoCard}${sectionsHtml}</div>
    ${_examMode ? '' : `<div class="t2-tpl-all-done-banner ${done === total && total > 0 ? 'vis' : ''}" id="tpl-done-banner">
      🎉 Xuất sắc! Bạn đã hoàn thành <b>${escHtml(type.name)}</b>! Nhấn "Làm lại" để ôn tiếp.
    </div>`}
    ${footerHtml}`;

  const fill = document.getElementById('tpl-progress-fill');
  if (fill) fill.style.width = _examMode ? '0%' : (pct + '%');
}

// ── Check / feedback ───────────────────────────────────────────
function checkCloze(key, answersStr) {
  const answers = answersStr.split('||');
  const card = document.getElementById('cloze-' + key);
  const fb   = document.getElementById('fb-'    + key);
  if (!card || !fb) return;

  let anyEmpty = false;
  answers.forEach((ans, bi) => {
    const inpId = answers.length > 1 ? `inp-${key}-b${bi}` : `inp-${key}`;
    const inp = document.getElementById(inpId);
    if (inp && !inp.value.trim()) anyEmpty = true;
  });
  if (anyEmpty) { showToast('Vui lòng điền đầy đủ trước khi kiểm tra!', 'warn', 2000); return; }

  const wasNew = !_tplScores[key];
  let allOk = true;
  answers.forEach((ans, bi) => {
    const inpId = answers.length > 1 ? `inp-${key}-b${bi}` : `inp-${key}`;
    const inp = document.getElementById(inpId);
    if (!inp) return;
    if (inp.value.trim().toLowerCase() !== ans.toLowerCase()) allOk = false;
  });

  _tplScores[key] = allOk ? 'ok' : 'err';
  saveTplScores();
  card.className = 't2-cloze-card ' + (allOk ? 'tpl-correct' : 'tpl-wrong');
  fb.className   = 't2-cloze-fb '   + (allOk ? 'ok' : 'err');

  if (allOk) {
    fb.textContent = '✅ Đúng!';
    answers.forEach((ans, bi) => {
      const inpId = answers.length > 1 ? `inp-${key}-b${bi}` : `inp-${key}`;
      const inp = document.getElementById(inpId);
      if (inp) inp.disabled = true;
    });
    playOk();
    if (wasNew) awardTplXP(card);
    setTimeout(() => scrollToNextCloze(key), 450);
  } else {
    const wrongParts = answers.map((ans, bi) => {
      const inpId = answers.length > 1 ? `inp-${key}-b${bi}` : `inp-${key}`;
      const inp = document.getElementById(inpId);
      const uv = inp ? inp.value.trim().toLowerCase() : '';
      return uv !== ans.toLowerCase() ? `"${ans}"` : null;
    }).filter(Boolean);
    fb.textContent = `❌ Đáp án: ${wrongParts.join(', ')}`;
    playWrong();
  }

  updateTplScore();
  updateOverallBadge();
  checkTypeComplete();
}

function showClozeHint(key, answersStr) {
  const answers = answersStr.split('||');
  answers.forEach((ans, bi) => {
    const inpId = answers.length > 1 ? `inp-${key}-b${bi}` : `inp-${key}`;
    const inp = document.getElementById(inpId);
    if (!inp || inp.disabled) return;
    inp.value = ans.slice(0, Math.ceil(ans.length / 2));
    inp.focus();
  });
  const hints = answers.map(a => `"${a.slice(0, Math.ceil(a.length/2))}…"`).join(', ');
  showToast('💡 Gợi ý: ' + hints, 'info', 2000);
}

function resetClozeCard(key) {
  if (_tplScores[key] === 'err') {
    const card = document.getElementById('cloze-' + key);
    const fb   = document.getElementById('fb-'    + key);
    if (card) card.className = 't2-cloze-card';
    if (fb)   { fb.className = 't2-cloze-fb'; fb.textContent = ''; }
    delete _tplScores[key];
  }
}

// ── Score display ──────────────────────────────────────────────
function updateTplScore() {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  let done = 0, total = 0;
  type.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      total++;
      if (_tplScores[`${_tplActiveType}-${si}-${ii}`] === 'ok') done++;
    });
  });
  const scoreEl = document.querySelector('.t2-tpl-score');
  if (scoreEl) scoreEl.textContent = `${done} / ${total}`;
  const pctEl = document.querySelector('.t2-tpl-pct');
  if (pctEl) pctEl.textContent = total ? Math.round(done / total * 100) + '%' : '0%';
  const fill = document.getElementById('tpl-progress-fill');
  if (fill && !_examMode) fill.style.width = total ? (done / total * 100) + '%' : '0%';
}

function updateOverallBadge() {
  const totalAll = Object.values(TPL_DATA).reduce((s, t) =>
    s + t.sections.reduce((ss, sec) => ss + sec.items.length, 0), 0);
  const doneAll = Object.keys(_tplScores).filter(k => _tplScores[k] === 'ok').length;
  const badge = document.getElementById('tpl-main-badge');
  if (badge) badge.textContent = `${doneAll} / ${totalAll} mẫu câu`;
}

// ── Vietnamese toggle ──────────────────────────────────────────
function toggleTplVi() {
  if (_examMode) { showToast('Không dùng dịch trong chế độ thi thử!', 'warn', 2000); return; }
  _tplShowVi = !_tplShowVi;
  document.querySelectorAll('.t2-cloze-vi').forEach(el => el.classList.toggle('vis', _tplShowVi));
  const tabBtn = document.getElementById('tpl-vi-btn');
  const label  = document.getElementById('tpl-vi-label');
  if (tabBtn) tabBtn.classList.toggle('active', _tplShowVi);
  if (label)  label.textContent = _tplShowVi ? 'Ẩn TV' : 'Tiếng Việt';
}

// ── Reset current type ─────────────────────────────────────────
function resetTplType() {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  type.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      delete _tplScores[`${_tplActiveType}-${si}-${ii}`];
    });
  });
  saveTplScores();
  updateOverallBadge();
  renderTplContent();
}

// ── Type switch ────────────────────────────────────────────────
function switchTplType(typeId) {
  if (typeId === _tplActiveType) return;
  if (_examMode) {
    _pendingTypeId     = typeId;
    _pendingExamSwitch = true;
    const toMeta = TPL_TYPES.find(t => t.id === typeId);
    document.getElementById('tpl-switch-sub').innerHTML =
      `⏱️ Bạn đang ở <b>chế độ thi thử</b>.<br>Chuyển type sẽ <b>thoát khỏi chế độ thi thử</b>. Tiếp tục?`;
    const confirmBtn = document.getElementById('tpl-switch-confirm-btn');
    if (confirmBtn) confirmBtn.textContent = toMeta ? `Chuyển → ${toMeta.label}` : 'Chuyển type';
    document.getElementById('tpl-switch-overlay').classList.remove('hidden');
    return;
  }
  const type = TPL_DATA[_tplActiveType];
  const hasProgress = type && type.sections.some((sec, si) =>
    sec.items.some((item, ii) => !!_tplScores[`${_tplActiveType}-${si}-${ii}`])
  );
  if (hasProgress) {
    _pendingTypeId = typeId;
    const fromMeta = TPL_TYPES.find(t => t.id === _tplActiveType);
    const toMeta   = TPL_TYPES.find(t => t.id === typeId);
    let done = 0, total = 0;
    type.sections.forEach((sec, si) => sec.items.forEach((item, ii) => {
      total++;
      if (_tplScores[`${_tplActiveType}-${si}-${ii}`] === 'ok') done++;
    }));
    document.getElementById('tpl-switch-sub').innerHTML =
      `Bạn đã làm được <b>${done}/${total}</b> câu của <b>${fromMeta ? fromMeta.label : _tplActiveType}</b>.<br>Tiến độ được <b>lưu lại</b> — bạn có thể quay về bất cứ lúc nào.`;
    const confirmBtn = document.getElementById('tpl-switch-confirm-btn');
    if (confirmBtn && toMeta) confirmBtn.textContent = `Chuyển → ${toMeta.label} · ${TPL_DATA[typeId]?.name || ''}`;
    document.getElementById('tpl-switch-overlay').classList.remove('hidden');
  } else {
    doSwitchType(typeId);
  }
}

function confirmTypeSwitch() {
  document.getElementById('tpl-switch-overlay').classList.add('hidden');
  const typeId = _pendingTypeId;
  const wasExam = _pendingExamSwitch;
  _pendingTypeId     = null;
  _pendingExamSwitch = false;
  if (!typeId) return;
  if (wasExam) exitExamMode();
  doSwitchType(typeId);
}

function cancelTypeSwitch() {
  document.getElementById('tpl-switch-overlay').classList.add('hidden');
  _pendingTypeId     = null;
  _pendingExamSwitch = false;
}

function doSwitchType(typeId) {
  _tplActiveType = typeId;
  document.querySelectorAll('.t2-type-tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tplType === typeId);
  });
  renderTplContent();
  updateTplScore();
}

// ── Exam mode ──────────────────────────────────────────────────
function toggleExamMode() {
  if (_examMode) exitExamMode();
  else enterExamMode();
}

function enterExamMode() {
  if (_tplShowVi) {
    _tplShowVi = false;
    const btn = document.getElementById('tpl-vi-btn');
    const lbl = document.getElementById('tpl-vi-label');
    if (btn) btn.classList.remove('active');
    if (lbl) lbl.textContent = 'Tiếng Việt';
  }
  _examMode     = true;
  _examTimeLeft = 1800;
  _examStartTime = Date.now();
  renderTplContent();
  _examTimerInterval = setInterval(tickExamTimer, 1000);
  updateExamBtn();
  showToast('⏱ Bắt đầu thi thử! Không có gợi ý – nộp bài khi xong.', 'info', 3000);
}

function exitExamMode() {
  clearInterval(_examTimerInterval);
  _examTimerInterval = null;
  _examMode      = false;
  _examStartTime = null;
  renderTplContent();
  updateExamBtn();
}

function updateExamBtn() {
  const btn = document.getElementById('tpl-exam-btn');
  const lbl = document.getElementById('tpl-exam-label');
  if (!btn || !lbl) return;
  btn.classList.toggle('active', _examMode);
  lbl.textContent = _examMode ? 'Đang thi' : 'Thi thử';
}

function tickExamTimer() {
  _examTimeLeft = Math.max(0, _examTimeLeft - 1);
  const disp = document.getElementById('exam-time-display');
  if (disp) {
    disp.textContent = fmtTime(_examTimeLeft);
    disp.className = 't2-exam-timer' + (_examTimeLeft <= 60 ? ' warn' : '');
  }
  if (_examTimeLeft <= 0) {
    clearInterval(_examTimerInterval);
    _examTimerInterval = null;
    showToast('⏰ Hết giờ! Bài đang được chấm tự động...', 'warn', 3000);
    setTimeout(submitExam, 1000);
  }
}

function submitExam() {
  clearInterval(_examTimerInterval);
  _examTimerInterval = null;

  const type = TPL_DATA[_tplActiveType];
  if (!type) return;

  let correct = 0, total = 0;
  const timeTaken = _examStartTime ? Math.floor((Date.now() - _examStartTime) / 1000) : 1800 - _examTimeLeft;

  type.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      const key = `${_tplActiveType}-${si}-${ii}`;
      const card = document.getElementById('cloze-' + key);
      const fb   = document.getElementById('fb-'    + key);
      const answers = Array.isArray(item.answers) ? item.answers : [item.answer];
      total++;

      let allOk = true;
      const wrongAnswers = [];
      answers.forEach((ans, bi) => {
        const inpId = answers.length > 1 ? `inp-${key}-b${bi}` : `inp-${key}`;
        const inp = document.getElementById(inpId);
        const uv  = inp ? inp.value.trim().toLowerCase() : '';
        if (uv !== ans.toLowerCase()) { allOk = false; wrongAnswers.push(`"${ans}"`); }
        if (inp) inp.disabled = true;
      });

      if (allOk) {
        correct++;
        if (card) card.className = 't2-cloze-card tpl-correct';
        if (fb)   { fb.className = 't2-cloze-fb ok'; fb.textContent = '✅ Đúng!'; }
      } else {
        if (card) card.className = 't2-cloze-card tpl-wrong';
        if (fb)   { fb.className = 't2-cloze-fb err'; fb.textContent = `❌ Đáp án: ${wrongAnswers.join(', ')}`; }
      }
    });
  });

  // Update exam bar with results
  const bar = document.getElementById('exam-bar');
  if (bar) {
    const pct  = Math.round(correct / total * 100);
    const rank = pct >= 80 ? '🏆 Xuất sắc!' : pct >= 60 ? '👍 Khá tốt!' : '💪 Cần ôn thêm!';
    bar.innerHTML = `
      <span style="font-size:13px;font-weight:800">📋 ${correct}/${total} đúng (${pct}%)</span>
      <span class="t2-exam-label">${rank} · ⏱ ${fmtTime(timeTaken)}</span>
      <button class="t2-exam-exit-btn" onclick="exitExamMode()">✕ Thoát thi</button>`;
  }

  // Update footer
  const footerEl = document.querySelector('.t2-tpl-footer');
  if (footerEl) {
    footerEl.innerHTML = `
      <span>Đúng: <span class="t2-tpl-score">${correct} / ${total}</span></span>
      <button class="t2-tpl-reset-btn" onclick="exitExamMode()">✕ Thoát thi thử</button>`;
  }

  _examMode = false;
  updateExamBtn();

  const pct = Math.round(correct / total * 100);
  showToast(`📋 Kết quả: ${correct}/${total} (${pct}%) · ${fmtTime(timeTaken)}`,
    pct >= 80 ? 'success' : pct >= 60 ? 'info' : 'warn', 4500);
  if (pct >= 80) updateXPStorage(20);
}

function fmtTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ── XP pop ─────────────────────────────────────────────────────
function awardTplXP(card) {
  updateXPStorage(3);
  const rect = card.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 't2-tpl-xp-pop';
  pop.textContent = '+3 XP ⭐';
  pop.style.cssText = `left:${rect.left + window.scrollX + rect.width / 2 - 28}px;top:${rect.top + window.scrollY - 10}px;`;
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

// ── Auto-scroll to next unanswered ─────────────────────────────
function scrollToNextCloze(currentKey) {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  let found = false;
  for (let si = 0; si < type.sections.length; si++) {
    const sec = type.sections[si];
    for (let ii = 0; ii < sec.items.length; ii++) {
      const k = `${_tplActiveType}-${si}-${ii}`;
      if (k === currentKey) { found = true; continue; }
      if (found && (!_tplScores[k] || _tplScores[k] === 'err')) {
        const nextCard = document.getElementById('cloze-' + k);
        if (nextCard) {
          nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // Focus first input of next card
          const nextInp = nextCard.querySelector('.t2-cloze-input:not([disabled])');
          if (nextInp) setTimeout(() => nextInp.focus(), 380);
        }
        return;
      }
    }
  }
}

// ── Completion check ───────────────────────────────────────────
function checkTypeComplete() {
  const type = TPL_DATA[_tplActiveType];
  if (!type) return;
  let done = 0, total = 0;
  type.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      total++;
      if (_tplScores[`${_tplActiveType}-${si}-${ii}`] === 'ok') done++;
    });
  });
  if (done < total) return;
  const banner = document.getElementById('tpl-done-banner');
  if (banner && !banner.classList.contains('vis')) {
    banner.classList.add('vis');
    banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showToast(`🏆 Hoàn thành ${TPL_DATA[_tplActiveType].name}! +10 XP bonus!`, 'success', 3500);
    updateXPStorage(10);
    updateOverallBadge();
  }
}

// ── Helpers ────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
</script>
